<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>林勝崴 Albert | Personal Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* Document Setup */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #08080a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", "Microsoft JhengHei", sans-serif;
            color: #ffffff;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            touch-action: none; /* 阻止行動端瀏覽器不必要的下拉重整與橡皮筋回彈 */
        }

        /* Fixed Background Canvas */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Base Card Interface Grid */
        .symmetric-card, .station-weather-board {
            position: absolute;
            background: rgba(20, 20, 25, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 40px 30px;
            width: calc(100% - 32px);
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            box-sizing: border-box;
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1), transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Primary Profile Card Specifics */
        .symmetric-card {
            z-index: 2;
            text-align: center;
            opacity: 0;
            transform: translateY(15px);
        }

        .symmetric-card.active {
            opacity: 1;
            transform: translateY(0);
        }

        .symmetric-card.hidden-state {
            opacity: 0;
            transform: translateY(15px);
            pointer-events: none;
        }

        /* Fullscale Meteorological Station Dashboard */
        .station-weather-board {
            z-index: 1;
            opacity: 0;
            transform: scale(0.95) translateY(-10px);
            pointer-events: none;
        }

        .station-weather-board.active {
            z-index: 3;
            opacity: 1;
            transform: scale(1) translateY(0);
            pointer-events: auto;
        }

        /* Hover States */
        .symmetric-card:hover, .station-weather-board:hover {
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        /* 即時時間觀測器樣式 */
        .live-clock-wrapper {
            font-size: 0.85rem;
            font-family: "Courier New", Courier, monospace; /* 使用等寬字型，防止數字跳動 */
            color: #8c94f4;
            letter-spacing: 1px;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        #live-clock {
            font-weight: 600;
        }

        #live-date {
            font-size: 0.7rem;
            color: #707080;
            margin-top: 2px;
        }

        /* Avatar Elements */
        .avatar-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background-color: #1a1a22;
            border: 3px solid rgba(255, 255, 255, 0.1);
            object-fit: cover;
            display: block;
        }

        .avatar-wrapper::after {
            content: '';
            position: absolute;
            top: -6px; left: -6px; right: -6px; bottom: -6px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Typography Configuration */
        .name {
            font-size: 2rem;
            font-weight: 600;
            margin: 0 0 4px 0;
            letter-spacing: 1px;
        }

        .bio {
            font-size: 0.95rem;
            color: #a0a0b0;
            margin: 0 0 20px 0;
            font-weight: 300;
            line-height: 1.5;
        }

        /* 個人格言樣式 */
        .motto {
            font-size: 0.88rem;
            color: #dcdcdc;
            font-style: italic;
            margin: 0 0 25px 0;
            line-height: 1.6;
            font-weight: 300;
            letter-spacing: 0.5px;
            padding: 0 10px;
        }

        /* Pill Capsules */
        .tag-capsules {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .capsule {
            background: rgba(255, 255, 255, 0.04);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #dcdcdc;
            display: flex;
            align-items: center;
            gap: 6px;
            letter-spacing: 0.5px;
        }

        .capsule.callsign {
            border-color: rgba(140, 148, 244, 0.3);
            color: #a2aaff;
        }

        /* Social Node Grid */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 35px;
        }

        .social-icon {
            color: #a0a0b0;
            font-size: 1.6rem;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .social-icon:hover {
            transform: scale(1.15) translateY(-2px);
        }
        
        .social-icon.instagram:hover { color: #e1306c; }
        .social-icon.discord:hover { color: #5865f2; }
        .social-icon.email:hover { color: #1d9bf0; }

        /* Functional Button Stack */
        .action-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            width: 100%;
        }

        .btn {
            display: block;
            width: 100%;
            max-width: 320px;
            padding: 15px;
            background: #ffffff;
            color: #000000;
            text-decoration: none;
            border-radius: 14px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s ease;
            box-sizing: border-box;
            border: none;
            cursor: pointer;
            text-align: center;
        }

        .btn:hover {
            transform: scale(1.03);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.1);
        }

        .btn.secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn.secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Board Technical Sub-layout */
        .board-header {
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 15px;
            margin-bottom: 25px;
            text-align: left;
        }

        .board-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
            letter-spacing: 0.5px;
        }

        .board-subtitle {
            font-size: 0.8rem;
            color: #707080;
            margin: 4px 0 0 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .metrics-vertical-stack {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 30px;
        }

        .metric-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 14px 18px;
            border-radius: 14px;
        }

        .metric-label {
            font-size: 0.9rem;
            color: #a0a0b0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .metric-label i {
            width: 16px;
            text-align: center;
            color: #8c94f4;
        }

        .metric-val {
            font-size: 1.05rem;
            font-weight: 600;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>

    <!-- UI Block 1: Profile Gateway -->
    <div class="symmetric-card">
        <!-- 頂部極簡時間觀測 -->
        <div class="live-clock-wrapper">
            <i class="far fa-clock"></i> <span id="live-clock">00:00:00</span>
            <div id="live-date">2026 / 01 / 01 SUN</div>
        </div>

        <div class="avatar-wrapper">
            <img src="avatar.jpg" alt="Avatar" class="avatar">
        </div>
        
        <h1 class="name">林勝崴 Albert</h1>
        <p class="bio">Student / Radio / Railway</p>
        
        
        <p class="motto">
            給我一個槓桿，我可以虧掉一個地球。
        </p>
        
        <div class="tag-capsules">
            <div class="capsule callsign">
                <i class="fas fa-broadcast-tower"></i>
                <span>BM5GUP</span>
            </div>
            <div class="capsule">
                <i class="fas fa-map-marker-alt"></i>
                <span>彰化, TW</span>
            </div>
        </div>

        <div class="social-links">
            <a href="https://www.instagram.com/albert._.990706/" class="social-icon instagram" title="Instagram" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://discord.com/users/987684332430835753" class="social-icon discord" title="Discord Profile" target="_blank"><i class="fab fa-discord"></i></a>
            <a href="mailto:albert07062010@gmail.com" class="social-icon email" title="Email"><i class="fas fa-envelope"></i></a>
        </div>

        <div class="action-stack">
            <button class="btn" id="weatherTriggerBtn" onclick="switchInterface(true)">
                <i class="fas fa-cloud-sun" style="margin-right: 8px;"></i>彰化數據同步中...
            </button>
            <a href="https://discord.com/users/987684332430835753" class="btn secondary" target="_blank" style="border-color: rgba(88, 101, 242, 0.4); color: #8c94f4;">
                <i class="fab fa-discord" style="margin-right: 8px;"></i>聯絡我 / Add Discord Friend
            </a>
        </div>
    </div>

    <!-- UI Block 2: Environmental Station Telemetry Board -->
    <div class="station-weather-board" id="weatherBoard">
        <div class="board-header">
            <h2 class="board-title">彰化氣象觀測台</h2>
            <p class="board-subtitle">Live Meteorological Metrics</p>
        </div>

        <div class="metrics-vertical-stack">
            <div class="metric-row">
                <div class="metric-label"><i class="fas fa-smog"></i> 當前大氣</div>
                <div class="metric-val" id="w-desc">--</div>
            </div>
            <div class="metric-row">
                <div class="metric-label"><i class="fas fa-thermometer-half"></i> 體感溫度</div>
                <div class="metric-val" id="w-feel">--°C</div>
            </div>
            <div class="metric-row">
                <div class="metric-label"><i class="fas fa-tint"></i> 相對濕度</div>
                <div class="metric-val" id="w-humidity">--%</div>
            </div>
            <div class="metric-row">
                <div class="metric-label"><i class="fas fa-wind"></i> 即時風速</div>
                <div class="metric-val" id="w-wind">-- km/h</div>
            </div>
        </div>

        <button class="btn secondary" onclick="switchInterface(false)" style="width: 100%;">
            <i class="fas fa-arrow-left" style="margin-right: 8px;"></i> 返回個人主頁
        </button>
    </div>

    <!-- Core Automation Scripts -->
    <script>
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray = [];

        let currentEnv = {
            isRainy: false,
            windSpeed: 1.5
        };

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.querySelector('.symmetric-card').classList.add('active');
            }, 50);
            fetchWeatherMetrics();
        });

        // Interface toggle logic
        function switchInterface(toWeather) {
            const card = document.querySelector('.symmetric-card');
            const board = document.getElementById('weatherBoard');
            
            if (toWeather) {
                card.classList.add('hidden-state');
                setTimeout(() => {
                    board.classList.add('active');
                }, 150); 
            } else {
                board.classList.remove('active');
                setTimeout(() => {
                    card.classList.remove('hidden-state');
                }, 150);
            }
        }

        // Fetch metrics sequence from live backend endpoint
        async function fetchWeatherMetrics() {
            try {
                const res = await fetch('https://wttr.in/Changhua?format=j1');
                if (!res.ok) throw new Error();
                const data = await res.json();
                
                const condition = data.current_condition[0];
                const tempC = condition.temp_C;
                const feelsLike = condition.FeelsLikeC;
                const humidity = condition.humidity;
                const speedKmh = condition.windspeedKmph;
                const weatherDesc = condition.weatherDesc[0].value;
                
                currentEnv.windSpeed = Math.max(0.5, parseFloat(speedKmh) / 3.6);
                if (weatherDesc.toLowerCase().includes('rain') || weatherDesc.toLowerCase().includes('shower')) {
                    currentEnv.isRainy = true;
                }

                document.getElementById('w-desc').innerText = weatherDesc;
                document.getElementById('w-feel').innerText = `${feelsLike}°C`;
                document.getElementById('w-humidity').innerText = `${humidity}%`;
                document.getElementById('w-wind').innerText = `${speedKmh} km/h`;

                const triggerBtn = document.getElementById('weatherTriggerBtn');
                const weatherIcon = currentEnv.isRainy ? 'fa-cloud-showers-heavy' : 'fa-cloud-sun';
                triggerBtn.innerHTML = `<i class="fas ${weatherIcon}" style="margin-right: 8px;"></i>彰化市當前氣溫 ${tempC}°C`;
                
                init();
            } catch (err) {
                document.getElementById('weatherTriggerBtn').innerHTML = `<i class="fas fa-bolt" style="margin-right: 8px;"></i>即時氣象觀測台`;
                document.getElementById('w-desc').innerText = '數據連線失敗';
            }
        }

        class Particle {
            constructor(x, y, size) {
                this.x = x;
                this.y = y;
                this.size = size;
                this.vx = (Math.random() * 0.4 - 0.2);
                this.vy = (Math.random() * 0.4 - 0.2);
                this.alpha = Math.random() * 0.3 + 0.1;
            }

            draw() {
                ctx.beginPath();
                if (currentEnv.isRainy) {
                    ctx.strokeStyle = `rgba(162, 170, 255, ${this.alpha})`;
                    ctx.lineWidth = this.size * 0.8;
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(this.x + (currentEnv.windSpeed * 1.5), this.y + 12);
                    ctx.stroke();
                } else {
                    ctx.fillStyle = `rgba(200, 200, 210, ${this.alpha})`;
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            update() {
                if (currentEnv.isRainy) {
                    this.y += 8 + (this.size * 2);
                    this.x += currentEnv.windSpeed * 0.6;
                    if (this.y > canvas.height) {
                        this.y = 0;
                        this.x = Math.random() * canvas.width;
                    }
                    if (this.x > canvas.width) this.x = 0;
                } else {
                    this.x += this.vx + (currentEnv.windSpeed * 0.1);
                    this.y += this.vy;
                    if (this.x > canvas.width) this.x = 0;
                    if (this.x < 0) this.x = canvas.width;
                    if (this.y > canvas.height) this.y = 0;
                    if (this.y < 0) this.y = canvas.height;
                }
                this.draw();
            }
        }

        function init() {
            particlesArray = [];
            let density = currentEnv.isRainy ? 8000 : 12000;
            let numberOfParticles = (canvas.height * canvas.width) / density;
            for (let i = 0; i < numberOfParticles; i++) {
                let size = currentEnv.isRainy ? (Math.random() * 1.5 + 1) : (Math.random() * 1.2 + 0.5);
                let x = Math.random() * canvas.width;
                let y = Math.random() * canvas.height;
                particlesArray.push(new Particle(x, y, size));
            }
        }

        // 僅保留粒子間的微弱網格連線（晴天時），已徹底移除了與滑鼠有關的互動線條
        function connect() {
            if (currentEnv.isRainy) return;
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a + 1; b < particlesArray.length; b++) {
                    let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x)) + 
                                   ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                    
                    if (distance < (canvas.width / 8) * (canvas.height / 8)) {
                        ctx.strokeStyle = 'rgba(200, 200, 210, 0.06)';
                        ctx.lineWidth = 0.8;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        const animate = () => {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, innerWidth, innerHeight);
            for (let i = 0; i < particlesArray.length; i++) { particlesArray[i].update(); }
            connect();
        }

        window.addEventListener('resize', function() {
            canvas.width = innerWidth; canvas.height = innerHeight;
            init();
        });

        // 即時時間自動更新驅動核心
        function updateLiveClock() {
            const now = new Date();
            
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('live-clock').innerText = `${hours}:${minutes}:${seconds}`;
            
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const date = String(now.getDate()).padStart(2, '0');
            const days = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
            const dayOfWeek = days[now.getDay()];
            
            document.getElementById('live-date').innerText = `${year} / ${month} / ${date} ${dayOfWeek}`;
        }

        setInterval(updateLiveClock, 1000);
        updateLiveClock();

        init(); 
        animate();
    </script>
</body>
</html>
